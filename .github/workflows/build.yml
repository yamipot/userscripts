name: Build userscripts

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-userscripts-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-ehpeek:
    name: Build ehpeek
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ehpeek

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Build
        env:
          EHPEEK_RELEASE_BUILD: "true"
        run: npm run build

      - name: Publish built userscript branch
        if: github.event_name != 'pull_request'
        working-directory: .
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          build_branch="build-${safe_ref}"
          worktree="$(mktemp -d)"
          artifact="$(mktemp)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp ehpeek/dist/ehpeek.user.js "$artifact"

          if git ls-remote --exit-code --heads origin "$build_branch" >/dev/null 2>&1; then
            git fetch origin "$build_branch"
            git worktree add -B "$build_branch" "$worktree" "origin/$build_branch"
          else
            git worktree add --detach "$worktree"
            cd "$worktree"
            git checkout --orphan "$build_branch"
            git rm -rf . >/dev/null 2>&1 || true
            cd -
          fi

          cd "$worktree"
          cp "$artifact" ehpeek.user.js
          git add ehpeek.user.js
          if git diff --cached --quiet; then
            echo "No build output changes."
            exit 0
          fi
          git commit -m "build ehpeek from ${GITHUB_SHA}"
          git push origin "HEAD:${build_branch}"
